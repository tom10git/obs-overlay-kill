# CI: lint / build / npm audit（サプライチェーン・品質）
name: CI

on:
  push:
    branches: [main, master]
  pull_request:

permissions:
  contents: read

concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  lint-and-build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@11bd71901bbe5b1630ca339c3e4837a03b136b39 # v4.2.2

      - name: Setup Node.js
        uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d682aa0c # v4.4.0
        with:
          node-version: "22"
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Create CI .env
        run: |
          cp .env.example .env
          sed -i 's/your_token_app_client_id_here/ci000000000000000000000000000000/g' .env
          sed -i 's/your_token_app_client_secret_here/ci_secret_for_build_only_xxxxxxxxxx/g' .env

      - name: Lint
        run: npm run lint

      - name: Build
        run: npm run build

      - name: npm audit (high+)
        run: npm audit --audit-level=high

  dependency-review:
    if: github.event_name == 'pull_request'
    runs-on: ubuntu-latest
    permissions:
      contents: read
      pull-requests: read
    steps:
      - name: Checkout
        uses: actions/checkout@11bd71901bbe5b1630ca339c3e4837a03b136b39 # v4.2.2

      - name: Dependency Review
        uses: actions/dependency-review-action@v4
        with:
          fail-on-severity: high
